{% load static %}
<!--<!DOCTYPE html>-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %} Eduka {% endblock%}</title>
    <link rel="shortcut icon" type="image/png" href="{% static 'images/favicon.png' %}"/>
    <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


<body>
<header style="margin-bottom:20px">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid d-flex justify-content-center align-items-center text-black">
            <a class="navbar-brand me-4 mb-0 py-0" href="#">
                Eduka
            </a>
            <form class="d-flex mb-0" style="width : 50% ; max-width : 600px;">
            <div class="input-group">
                <input class="form-control border border-danger shadow-none"   type="search" placeholder="I'm looking for..." aria-label="Search" >
                <span class="input-group-text border border-danger bg-danger text-white ">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </span>
            </div>
                <div class="d-flex align-items-center ms-4">

                    <a href="{% url 'cart'%}" class="text-decoration-none text-dark d-flex align-items-center me-3">
                       <i class="fa-solid fa-cart-arrow-down"></i>
                        <span>Cart</span>
                    </a>
                    <a href="{% url 'login'%}" class="text-decoration-none d-flex align-items-center text-dark">
                        <i class="fa-solid fa-user "></i>
                        <span>Account</span>
                    </a>


                </div>
        </form>
        </div>

    </nav>
</header>

<main>
    {% block content %}

    {% endblock%}
</main>

<footer>

</footer>

</body>
</html>
